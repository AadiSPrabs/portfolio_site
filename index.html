<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Interactive Background</title>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="grain-film"></div>
    
    <header class="top-header">
      <div class="glass-box shine-border header-left">
        <div class="name-text">
          <span class="initial">A</span><span class="hidden-text"><span class="hidden-inner">aditya </span></span>
          <span class="initial">S</span><span class="hidden-text"><span class="hidden-inner"> </span></span>
          <span class="initial">P</span><span class="hidden-text"><span class="hidden-inner">rabhu</span></span>
        </div>
      </div>
      
      <div class="glass-box shine-border header-right">
        <nav class="header-nav">
          <a href="#home" class="nav-item">Home</a>
          <span class="nav-sep"></span>
          <a href="#about" class="nav-item">About</a>
          <span class="nav-sep"></span>
          <a href="#projects" class="nav-item">Projects</a>
          <span class="nav-sep"></span>
          <a href="#contact" class="nav-item">Contact</a>
        </nav>
        <div class="header-divider"></div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
          <svg class="sun-and-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path class="moon-icon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            <g class="sun-icon">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </g>
          </svg>
        </button>
      </div>
    </header>
    
    <main id="app" class="content-wrapper"></main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
